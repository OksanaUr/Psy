<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Терапевтична анкета самопізнання</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.x/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --purple: #7F77DD; --purple-light: #EEEDFE; --purple-dark: #3C3489;
  --teal: #1D9E75; --teal-light: #E1F5EE; --teal-dark: #085041;
  --coral: #D85A30; --coral-light: #FAECE7; --coral-dark: #712B13;
  --gold: #C8892A; --gold-light: #FDF1DC;
  --blue: #4A7FC1; --blue-light: #EBF2FC;
  --pink: #C85A8A; --pink-light: #FAEBF2;
  --green: #3A9E7E; --green-light: #E3F5EF;
  --text: #2C2C2C; --muted: #888; --border: #E0E0E0;
  --white: #fff; --bg: #F7F6FB;
  --radius: 12px; --radius-lg: 18px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.screen { display: none; min-height: 100vh; }
.screen.active { display: block; }

/* ===== HOME ===== */
.home-hero { background: linear-gradient(135deg, #EEEDFE 0%, #E1F5EE 50%, #FAECE7 100%); padding: 3rem 1rem 2.5rem; text-align: center; position: relative; overflow: hidden; }
.hs { position: absolute; border-radius: 50%; opacity: 0.1; animation: float 7s ease-in-out infinite; }
.hs1 { width: 260px; height: 260px; background: var(--purple); top: -70px; left: -60px; }
.hs2 { width: 160px; height: 160px; background: var(--teal); bottom: -40px; right: -30px; animation-delay: 2s; }
.hs3 { width: 100px; height: 100px; background: var(--coral); top: 40%; right: 10%; animation-delay: 4s; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-16px)} }

.hero-badge { display: inline-flex; align-items: center; gap: 6px; background: white; padding: 5px 14px; border-radius: 20px; font-size: 12px; color: var(--purple-dark); font-weight: 500; margin-bottom: 1rem; box-shadow: 0 2px 10px rgba(127,119,221,0.15); position: relative; z-index: 1; }
.hero-title { font-size: clamp(1.7rem, 4vw, 2.6rem); font-weight: 800; color: var(--purple-dark); line-height: 1.2; margin-bottom: 0.5rem; position: relative; z-index: 1; }
.hero-title span { color: var(--teal-dark); }
.hero-sub { font-size: 0.95rem; color: var(--muted); line-height: 1.6; position: relative; z-index: 1; margin-bottom: 1.5rem; }

/* VERSION SWITCHER */
.version-tabs { display: flex; gap: 8px; justify-content: center; position: relative; z-index: 1; }
.vtab { padding: 8px 18px; border-radius: 50px; border: 1.5px solid var(--border); background: white; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; color: var(--muted); }
.vtab:hover { background: var(--bg); }
.vtab.active-a { background: var(--purple-light); color: var(--purple-dark); border-color: var(--purple); }
.vtab.active-b { background: var(--teal-light); color: var(--teal-dark); border-color: var(--teal); }
.vtab.active-c { background: var(--coral-light); color: var(--coral-dark); border-color: var(--coral); }

.home-inner { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
.section-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin: 1.5rem 0 0.75rem; }

.block-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.block-card { background: var(--white); border-radius: var(--radius-lg); border: 1.5px solid var(--border); padding: 1.25rem; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.04); display: flex; flex-direction: column; gap: 8px; position: relative; overflow: hidden; }
.block-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: var(--radius-lg) var(--radius-lg) 0 0; }
.block-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); border-color: transparent; }

.bc-icon { font-size: 1.8rem; }
.bc-title { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; }
.bc-desc { font-size: 12px; color: var(--muted); line-height: 1.5; }
.bc-tag { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; display: inline-block; margin-top: 2px; }

/* ===== MODULE ===== */
.topbar { position: sticky; top: 0; z-index: 100; background: rgba(247,246,251,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 10px 1rem; display: flex; align-items: center; gap: 12px; }
.back-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 20px; padding: 4px; border-radius: 8px; display: flex; align-items: center; transition: all 0.15s; }
.back-btn:hover { background: #eee; color: var(--text); }
.tb-info { flex: 1; }
.tb-title { font-size: 14px; font-weight: 700; color: var(--text); }
.tb-sub { font-size: 11px; color: var(--muted); }
.prog-bar { width: 70px; height: 4px; border-radius: 2px; background: var(--border); overflow: hidden; }
.prog-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
.prog-pct { font-size: 11px; font-weight: 600; color: var(--muted); min-width: 28px; }

.module-inner { max-width: 680px; margin: 0 auto; padding: 1.5rem 1rem 5rem; }
.module-header { border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 14px; }
.mh-icon { font-size: 2.2rem; }
.mh-title { font-size: 1.1rem; font-weight: 800; }
.mh-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

/* FIELDS */
.field-group { margin-top: 16px; }
.field-label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 7px; line-height: 1.5; font-weight: 500; }
textarea { width: 100%; border: 1.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; font-size: 14px; font-family: inherit; color: var(--text); background: #FAFAFA; resize: vertical; min-height: 72px; line-height: 1.7; transition: border-color 0.15s; }
textarea:focus { outline: none; background: var(--white); }
.scale-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.scale-btn { width: 40px; height: 40px; border: 1.5px solid var(--border); border-radius: var(--radius); background: var(--white); cursor: pointer; font-size: 13px; font-weight: 600; color: var(--muted); transition: all 0.15s; }
.scale-btn:hover { background: var(--bg); transform: scale(1.05); }
.scale-hints { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 5px; }
.pills { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.pill { padding: 7px 13px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 13px; cursor: pointer; color: var(--muted); background: var(--white); transition: all 0.15s; user-select: none; font-weight: 500; }
.pill:hover { background: var(--bg); }
.note-block { border-radius: var(--radius); padding: 14px 16px; font-size: 13px; color: var(--muted); font-style: italic; margin-top: 14px; line-height: 1.6; border-left: 3px solid; background: var(--bg); }
.hl-box { border-radius: var(--radius); padding: 16px; margin-top: 14px; }
.hl-label { font-size: 13px; color: var(--muted); margin-bottom: 8px; font-style: italic; margin-top: 10px; }
.inner-title { font-size: 13px; font-weight: 700; margin-top: 20px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.secret-box { border-left: 3px solid #EF9F27; background: #FAEEDA; border-radius: 0 var(--radius) var(--radius) 0; padding: 14px; margin-top: 12px; }
.secret-label { font-size: 12px; font-weight: 700; color: #854F0B; margin-bottom: 10px; }
.body-map { border: 2px dashed var(--border); border-radius: var(--radius); padding: 20px; margin-top: 12px; text-align: center; background: var(--bg); }

/* SAVE BAR */
.save-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-top: 1px solid var(--border); padding: 12px 1rem; display: flex; align-items: center; gap: 8px; z-index: 50; flex-wrap: wrap; }
.s-btn { padding: 10px 18px; border-radius: 50px; border: 1.5px solid var(--border); font-size: 13px; font-weight: 700; cursor: pointer; background: var(--white); color: var(--text); transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
.s-btn.primary { color: white; border-color: transparent; }
.s-btn:hover { opacity: 0.85; }
.s-status { font-size: 12px; color: var(--muted); margin-left: auto; }

.confetti-piece { position: fixed; width: 10px; height: 10px; top: -10px; border-radius: 2px; animation: cfall linear forwards; pointer-events: none; z-index: 9999; }
@keyframes cfall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

@media (max-width: 480px) {
  .block-grid { grid-template-columns: 1fr; }
  .version-tabs { flex-wrap: wrap; }
}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="home">
  <div class="home-hero">
    <div class="hs hs1"></div>
    <div class="hs hs2"></div>
    <div class="hs hs3"></div>
    <div class="hero-badge"><i class="ti ti-heart"></i> Авторська методика · Оксана Урожай</div>
    <h1 class="hero-title">Терапевтична анкета<br><span>самопізнання</span></h1>
    <p class="hero-sub">Обери версію і блок, який потрібен прямо зараз</p>
    <div class="version-tabs">
      <button class="vtab active-a" onclick="setVersion('a')">🌸 Підлітки</button>
      <button class="vtab" onclick="setVersion('b')">🌿 Дорослі</button>
      <button class="vtab" onclick="setVersion('c')">🛡️ Ветерани</button>
    </div>
  </div>
  <div class="home-inner" id="home-inner"></div>
</div>

<!-- MODULE -->
<div class="screen" id="module">
  <div class="topbar">
    <button class="back-btn" onclick="goHome()"><i class="ti ti-arrow-left"></i></button>
    <div class="tb-info">
      <div class="tb-title" id="tb-title"></div>
      <div class="tb-sub" id="tb-sub"></div>
    </div>
    <div style="display:flex;align-items:center;gap:6px">
      <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
      <span class="prog-pct" id="prog-pct">0%</span>
    </div>
  </div>
  <div class="module-inner" id="module-inner"></div>
  <div class="save-bar">
    <button class="s-btn primary" id="save-btn" onclick="savePDF()"><i class="ti ti-download"></i> Зберегти відповіді</button>
    <button class="s-btn" onclick="copyAnswers()"><i class="ti ti-copy"></i> Копіювати</button>
    <span class="s-status" id="s-status"></span>
  </div>
</div>

<script>
let currentVersion = 'a';
let currentModule = null;

const versionMeta = {
  a: { label: '🌸 Підлітки', accent: '#7F77DD', bg: '#EEEDFE', dark: '#3C3489' },
  b: { label: '🌿 Дорослі', accent: '#1D9E75', bg: '#E1F5EE', dark: '#085041' },
  c: { label: '🛡️ Ветерани', accent: '#D85A30', bg: '#FAECE7', dark: '#712B13' },
};

const blockDefs = {
  a: [
    { id:'a-intro', icon:'😊', color:'#7F77DD', bg:'#EEEDFE', title:'Привіт! Це — я', desc:'Знайомство, рівень зарядки, очікування від терапії', tag:'Початок', build: buildAIntro },
    { id:'a-inner', icon:'💜', color:'#C85A8A', bg:'#FAEBF2', title:'Мій внутрішній світ', desc:'Маленька Я, Захисник, Мудрий Дорослий — схема-терапія', tag:'Самопізнання', build: buildAInner },
    { id:'a-secrets', icon:'🔐', color:'#C8892A', bg:'#FDF1DC', title:'Секретики', desc:'Те, про що поки страшно говорити вголос', tag:'Особистий простір', build: buildASecrets },
    { id:'a-body', icon:'🫀', color:'#1D9E75', bg:'#E1F5EE', title:'Моє тіло', desc:'Де живе тривога, що тіло намагається сказати', tag:'Соматика', build: buildABody },
    { id:'a-relations', icon:'🤝', color:'#4A7FC1', bg:'#EBF2FC', title:'Мої стосунки', desc:'Хто поруч, патерни у стосунках', tag:'Стосунки', build: buildARelations },
    { id:'a-crisis', icon:'🌱', color:'#3A9E7E', bg:'#E3F5EF', title:'Антикризовий пакет', desc:'Що допомагає, мій план, лист собі', tag:'Ресурси', build: buildACrisis },
  ],
  b: [
    { id:'b-entry', icon:'○', color:'#1D9E75', bg:'#E1F5EE', title:'Точка входу', desc:'Ресурсний стан, метафора, очікування від терапії', tag:'Початок', build: buildBEntry },
    { id:'b-inner', icon:'◈', color:'#7F77DD', bg:'#EEEDFE', title:'Внутрішній ландшафт', desc:'Вразлива, захисна та ресурсна частини особистості', tag:'Самопізнання', build: buildBInner },
    { id:'b-hard', icon:'▪', color:'#C8892A', bg:'#FDF1DC', title:'Простір для важкого', desc:'Те, що важко сказати вголос. Але що існує.', tag:'Особистий простір', build: buildBHard },
    { id:'b-body', icon:'◉', color:'#1D9E75', bg:'#E1F5EE', title:'Тіло як свідок', desc:'Соматичний мапінг, нейроцепція, безпека', tag:'Соматика', build: buildBBody },
    { id:'b-relations', icon:'◇', color:'#4A7FC1', bg:'#EBF2FC', title:'Стосунки та патерни', desc:'Менталізація, перспектива іншого, повторювані патерни', tag:'Стосунки', build: buildBRelations },
    { id:'b-story', icon:'📖', color:'#C85A8A', bg:'#FAEBF2', title:'Моя історія', desc:'Таймлайн сили, нарративна терапія', tag:'Нарратив', build: buildBStory },
    { id:'b-crisis', icon:'◎', color:'#3A9E7E', bg:'#E3F5EF', title:'Антикризовий протокол', desc:'Ознаки кризи, план дій, лист собі', tag:'Ресурси', build: buildBCrisis },
  ],
  c: [
    { id:'c-entry', icon:'○', color:'#D85A30', bg:'#FAECE7', title:'Перший контакт', desc:'Ресурсний стан, межі, очікування', tag:'Початок', build: buildCEntry },
    { id:'c-identity', icon:'◈', color:'#D85A30', bg:'#FAECE7', title:'Ким я є', desc:'Ідентичність до і після служби, зміни та незмінне', tag:'Ідентичність', build: buildCIdentity },
    { id:'c-body', icon:'◉', color:'#C8892A', bg:'#FDF1DC', title:'Тіло після служби', desc:'Соматичний мапінг, сигнали небезпеки та безпеки', tag:'Соматика', build: buildCBody },
    { id:'c-hard', icon:'▪', color:'#C8892A', bg:'#FDF1DC', title:'Те, що важко носити', desc:'Без примусу. Лише якщо сам/сама хочеш.', tag:'Особистий простір', build: buildCHard },
    { id:'c-people', icon:'◇', color:'#4A7FC1', bg:'#EBF2FC', title:'Мої люди', desc:'Ті, хто розуміє, і ті, хто намагається', tag:'Стосунки', build: buildCPeople },
    { id:'c-support', icon:'◎', color:'#3A9E7E', bg:'#E3F5EF', title:'Моя опора', desc:'Ресурси, план, послання собі', tag:'Ресурси', build: buildCSupport },
  ],
};

function setVersion(v) {
  currentVersion = v;
  document.querySelectorAll('.vtab').forEach(t => t.className = 'vtab');
  document.querySelectorAll('.vtab')[['a','b','c'].indexOf(v)].classList.add('active-' + v);
  buildHome();
}

function buildHome() {
  const v = currentVersion;
  const vm = versionMeta[v];
  const blocks = blockDefs[v];
  const inner = document.getElementById('home-inner');
  inner.innerHTML = '';

  const grouped = {};
  blocks.forEach(b => {
    if (!grouped[b.tag]) grouped[b.tag] = [];
    grouped[b.tag].push(b);
  });

  Object.entries(grouped).forEach(([tag, items]) => {
    const lbl = document.createElement('div');
    lbl.className = 'section-label';
    lbl.textContent = tag;
    inner.appendChild(lbl);

    const grid = document.createElement('div');
    grid.className = 'block-grid';
    items.forEach(b => {
      const card = document.createElement('div');
      card.className = 'block-card';
      card.style.setProperty('--card-accent', b.color);
      card.style.cssText += `--card-accent:${b.color}`;
      card.style.borderTopColor = b.color;
      card.innerHTML = `
        <div class="bc-icon">${b.icon}</div>
        <div class="bc-title">${b.title}</div>
        <div class="bc-desc">${b.desc}</div>
        <span class="bc-tag" style="background:${b.bg};color:${b.color}">${b.tag}</span>`;
      card.style.setProperty('border-top', `3px solid ${b.color}`);
      card.onmouseover = () => { card.style.background = b.bg; card.style.borderColor = b.color; };
      card.onmouseout = () => { card.style.background = ''; card.style.borderColor = ''; };
      card.onclick = () => openModule(b);
      grid.appendChild(card);
    });
    inner.appendChild(grid);
  });
}

function openModule(b) {
  currentModule = b;
  document.getElementById('tb-title').textContent = b.title;
  document.getElementById('tb-sub').textContent = b.desc;
  document.getElementById('prog-fill').style.background = b.color;
  document.getElementById('save-btn').style.background = b.color;
  const inner = document.getElementById('module-inner');
  inner.innerHTML = '';

  const header = document.createElement('div');
  header.className = 'module-header';
  header.style.background = b.bg;
  header.innerHTML = `<span class="mh-icon">${b.icon}</span><div><div class="mh-title" style="color:${b.color}">${b.title}</div><div class="mh-sub">${b.desc}</div></div>`;
  inner.appendChild(header);

  b.build(inner, b);
  showScreen('module');
  updateProgress();
}

function goHome() { showScreen('home'); }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ===== HELPERS =====
function fld(label, ph='', tall=false) {
  const d = document.createElement('div');
  d.className = 'field-group';
  const l = document.createElement('label');
  l.className = 'field-label';
  l.textContent = label;
  d.appendChild(l);
  const ta = document.createElement('textarea');
  ta.placeholder = ph;
  if (tall) ta.style.minHeight = '100px';
  ta.oninput = updateProgress;
  d.appendChild(ta);
  return d;
}

function scl(label, from, to, color) {
  const d = document.createElement('div');
  d.className = 'field-group';
  const l = document.createElement('label');
  l.className = 'field-label';
  l.textContent = label;
  d.appendChild(l);
  const row = document.createElement('div');
  row.className = 'scale-row';
  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement('button');
    btn.className = 'scale-btn';
    btn.textContent = i;
    btn.onclick = () => {
      row.querySelectorAll('.scale-btn').forEach(b => { b.style.background=''; b.style.color=''; b.style.borderColor=''; });
      btn.style.background = color + '22';
      btn.style.color = color;
      btn.style.borderColor = color;
      updateProgress();
    };
    row.appendChild(btn);
  }
  d.appendChild(row);
  const h = document.createElement('div');
  h.className = 'scale-hints';
  h.innerHTML = `<span>${from}</span><span>${to}</span>`;
  d.appendChild(h);
  return d;
}

function plls(label, opts, color) {
  const d = document.createElement('div');
  d.className = 'field-group';
  const l = document.createElement('label');
  l.className = 'field-label';
  l.textContent = label;
  d.appendChild(l);
  const pg = document.createElement('div');
  pg.className = 'pills';
  opts.forEach(o => {
    const p = document.createElement('span');
    p.className = 'pill';
    p.textContent = o;
    p.onclick = () => {
      const on = p.dataset.on === '1';
      p.dataset.on = on ? '0' : '1';
      p.style.background = on ? '' : color + '22';
      p.style.color = on ? '' : color;
      p.style.borderColor = on ? '' : color;
      updateProgress();
    };
    pg.appendChild(p);
  });
  d.appendChild(pg);
  return d;
}

function nt(text, color) {
  const d = document.createElement('div');
  d.className = 'note-block';
  d.style.borderColor = color;
  d.textContent = text;
  return d;
}

function hlBox(bg, items) {
  const box = document.createElement('div');
  box.className = 'hl-box';
  box.style.background = bg;
  items.forEach(item => {
    const l = document.createElement('div');
    l.className = 'hl-label';
    l.textContent = item;
    box.appendChild(l);
    const ta = document.createElement('textarea');
    ta.oninput = updateProgress;
    box.appendChild(ta);
  });
  return box;
}

function iTitle(text, color) {
  const d = document.createElement('div');
  d.className = 'inner-title';
  d.style.color = color;
  d.textContent = text;
  return d;
}

function secretBox(label, color) {
  const box = document.createElement('div');
  box.className = 'secret-box';
  const lbl = document.createElement('div');
  lbl.className = 'secret-label';
  lbl.textContent = label;
  box.appendChild(lbl);
  const scaleWrap = document.createElement('div');
  scaleWrap.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap';
  const sl = document.createElement('span');
  sl.style.cssText = 'font-size:12px;color:#854F0B';

  scaleWrap.appendChild(sl);
  const sr = document.createElement('div');

    btn.style.cssText = 'width:26px;height:26px;border:1.5px solid #E0E0E0;border-radius:6px;background:white;cursor:pointer;font-size:11px;font-weight:600;color:#888';

  box.appendChild(ta);
  return box;
}

// ===== PROGRESS =====
function updateProgress() {
  const inner = document.getElementById('module-inner');
  if (!inner) return;
  const tas = inner.querySelectorAll('textarea');
  const filled = Array.from(tas).filter(t => t.value.trim().length > 2).length;
  const pct = tas.length ? Math.round(filled / tas.length * 100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct + '%';
}

// ===== SAVE =====
function buildAnswersText() {
  const b = currentModule;
  const inner = document.getElementById('module-inner');
  let text = (b ? b.title.toUpperCase() : '') + '\n';
  text += 'Дата: ' + new Date().toLocaleDateString('uk-UA') + '\n' + '─'.repeat(50) + '\n\n';
  inner.querySelectorAll('textarea').forEach(ta => {
    if (!ta.value.trim()) return;
    const fg = ta.closest('.field-group');
    const lbl = fg ? fg.querySelector('.field-label') : null;
    const prev = ta.previousElementSibling;
    const label = lbl ? lbl.textContent : (prev && prev.classList.contains('hl-label') ? prev.textContent : '');
    if (label) text += label.trim() + '\n';
    text += ta.value.trim() + '\n\n';
  });
  return text;
}

function savePDF() {
  const b = currentModule;
  const inner = document.getElementById('module-inner');
  const accent = b ? b.color : '#7F77DD';
  let html_fields = '';
  inner.querySelectorAll('textarea').forEach(ta => {
    if (!ta.value.trim()) return;
    const fg = ta.closest('.field-group');
    const lbl = fg ? fg.querySelector('.field-label') : null;
    const prev = ta.previousElementSibling;
    const label = lbl ? lbl.textContent : (prev && prev.classList.contains('hl-label') ? prev.textContent : '');
    html_fields += `<div class="f">${label?`<div class="fl">${label}</div>`:''}<div class="fv">${ta.value.trim().replace(/\n/g,'<br>')}</div></div>`;
  });

  const win = window.open('','_blank');
  if (!win) { alert('Дозволь pop-up для цього сайту і спробуй знову.'); return; }
  win.document.write(`<!DOCTYPE html><html lang="uk"><head><meta charset="UTF-8"><title>${b?b.title:''}</title>
  <style>@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
  body{font-family:Arial,sans-serif;color:#2C2C2C;padding:32px 40px;max-width:680px;margin:0 auto;font-size:13px;line-height:1.6}
  h1{color:${accent};font-size:20px;margin:0 0 4px}.meta{color:#999;font-size:12px;margin-bottom:24px;padding-bottom:12px;border-bottom:2px solid ${accent}}
  .f{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #f0f0f0}.fl{font-size:11px;color:#999;margin-bottom:3px}.fv{font-size:13px}
  .footer{margin-top:32px;font-size:10px;color:#ccc;text-align:center}
  .hint{background:#f0f0f0;border-radius:8px;padding:12px 16px;margin-bottom:24px;font-size:12px;color:#555}@media print{.hint{display:none}}</style></head><body>
  <div class="hint">💡 Щоб зберегти як PDF: <strong>Ctrl+P</strong> → <strong>«Зберегти як PDF»</strong></div>
  <h1>${b?b.icon+' '+b.title:''}</h1>
  <div class="meta">${b?versionMeta[currentVersion].label:''} &nbsp;·&nbsp; ${new Date().toLocaleDateString('uk-UA')}</div>
  ${html_fields}
  <div class="footer">© Оксана Урожай · Терапевтична анкета самопізнання</div>
  <script>window.onload=function(){window.print()}<\/script></body></html>`);
  win.document.close();
}

function copyAnswers() {
  const text = buildAnswersText();
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('[onclick="copyAnswers()"]');
    btn.innerHTML = '<i class="ti ti-check"></i> Скопійовано!';
    setTimeout(() => btn.innerHTML = '<i class="ti ti-copy"></i> Копіювати', 3000);
  });
}
